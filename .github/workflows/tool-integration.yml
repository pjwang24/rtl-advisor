name: Pinned Tool Integration

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".dockerignore"
      - ".github/docker/**"
      - ".github/scripts/run-mvp-tool-smoke.sh"
      - ".github/workflows/tool-integration.yml"
      - "src/rtl_advisor/mvp_*.py"
      - "tests/test_mvp_*.py"
      - "examples/mvp/**"
      - "rtl-advisor.toml"
      - "pyproject.toml"
      - "uv.lock"

permissions:
  contents: read

concurrency:
  group: tool-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  formal-and-synthesis-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Build digest-pinned tool image
        shell: bash
        run: |
          docker build \
            --file .github/docker/mvp-tools.Dockerfile \
            --tag rtl-advisor-mvp-tools:${{ github.sha }} \
            .

      - name: Run formal and synthesis smoke in the pinned container
        run: |
          docker run --rm --network none \
            rtl-advisor-mvp-tools:${{ github.sha }}
